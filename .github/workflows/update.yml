name: Update Leaderboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Rebuild leaderboard from the full archive'
        required: false
        default: 'false'

concurrency:
  group: nado-leaderboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetcher
        run: python fetch.py
        env:
          NADO_FULL_REFRESH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_refresh == 'true' && '1' || '' }}
          NADO_REQUEST_DELAY: "0"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json data/pipeline_state.json
          if git diff --cached --quiet; then
            echo "No leaderboard changes"
          else
            git commit -m "chore: update leaderboard.json [skip ci]"
            git push
          fi
